name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka-dev valgrind gfortran g++ rustc gnat cppcheck universal-ctags gcovr

      - name: Build release target
        run: make release

      - name: Run tests
        run: make test

      - name: Generate combined report
        if: always()
        run: make combined_report

      - name: Upload combined report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-report
          path: build/coverage
          if-no-files-found: error

      - name: Prepare Pages directory
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        run: |
          cp build/coverage/combined_report.html build/coverage/index.html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/coverage

      - name: Run static analysis
        run: make analyze

  deploy-coverage:
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
