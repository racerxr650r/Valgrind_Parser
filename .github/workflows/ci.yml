name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka-dev valgrind gfortran g++ rustc gnat cppcheck universal-ctags

      - name: Build release target
        run: make release

      - name: Run tests
        run: make test

      - name: Run static analysis
        run: make analyze
