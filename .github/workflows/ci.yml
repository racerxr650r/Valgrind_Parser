name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka-dev valgrind gfortran g++ rustc gnat cppcheck universal-ctags gcovr

      - name: Build release target
        run: make release

      - name: Run tests
        run: make test

      - name: Generate coverage report
        run: make coverage_report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage
          if-no-files-found: error

      - name: Run static analysis
        run: make analyze
